events {
    worker_connections 1024;
}

http {
    # 基础设置
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # SSL Session
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ========== HTTP: 强制跳转 HTTPS ==========
    server {
        listen 80;
        server_name
            funfundaily.com
            www.funfundaily.com
            blog.funfundaily.com
            api.funfundaily.com;  # ← 新增子域名

        # ACME challenge (Let's Encrypt)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        # 其他请求全部跳转 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========== HTTPS: Schedule App（新增）==========
    server {
        listen 443 ssl;
        server_name funfundaily.com api.funfundaily.com;  # ← 专属子域名

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/funfundaily.com.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ========== MCP（Streamable HTTP）：单端点 /mcp（POST JSON-RPC + 可选 GET SSE 流）。
        # 必须关 buffering，否则流式响应被 nginx 攒住、握手/工具响应卡死。
        # 用前缀 location /mcp 同时覆盖 /mcp（精确）与 /mcp/*（兼容旧路径）。==========
        location /mcp {
            proxy_pass http://schedule-app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";       # 保持长连接，别带 close

            proxy_buffering off;                  # 关键：实时透传 SSE（chunked 保持默认开，SSE 靠它分帧）
            proxy_cache off;
            proxy_read_timeout 3600s;             # SSE 长连接，避免默认 60s 被掐断
            proxy_send_timeout 3600s;
        }

        # 代理到 Spring Boot 应用
        location / {
            proxy_pass http://schedule-app:8080;  # ← Docker Compose 服务名
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            # 如果你的 API 用 WebSocket，取消下面两行注释
            # proxy_set_header Upgrade $http_upgrade;
            # proxy_set_header Connection "upgrade";
        }

        # 可选：隐藏后端 Server 信息
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }
}

# 生产环境：MySQL 数据库（替换为你的生产库配置）
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/funfun_schedule?useSSL=false&serverTimezone=GMT%2B8 # 注意 GMT%2B8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none # 生产环境禁止自动建表（手动执行 SQL）
    show-sql: true # 关闭 SQL 打印（安全+性能）

# 开发环境：微信小程序测试号配置（替换为你的测试号 appid/secret）
wechat:
  mini:
    appid: your-wechat-dev-appid # 微信测试号 appid
    secret: your-wechat-dev-secret # 微信测试号 secret
    jscode2session-url: https://api.weixin.qq.com/sns/jscode2session
    # mock 加密数据（前端可直接使用，无需调用 wx.getUserProfile）
    mock:
      encryptedData: "mock-encrypted-data" # 实际测试时，可使用微信开发者工具生成的真实加密数据
      iv: "mock-iv-16bytes" # 必须 16 位（AES-CBC 加密向量要求）
      rawData: "{\"nickName\":\"Mock昵称\",\"avatarUrl\":\"https://mock-avatar.png\",\"gender\":1}"
      signature: "mock-signature"
# 开发环境：JWT 密钥（简单密钥，仅用于测试）
jwt:
  secret: k3VhG8nR2pL9qWxYzA7bNcM1oP5sT6uIvJ4eQ0fD2gH8jK3lZ=  # 至少32位
  expire: 7200 # token过期时间（秒），默认2小时


app:
  limit:
    count:
      group: 2
      group-member: 3
    vip-count:
      group: 3
      group-member: 10


# 开发环境：H2 内存库（无需本地 MySQL；进程退出即清空）
# MySQL 兼容模式 + 大小写不敏感，匹配实体里 `TINYINT/JSON/反引号` 等 MySQL 写法。
# DB_CLOSE_DELAY=-1 让连接池关连接时不会顺手关库；DATABASE_TO_LOWER 保持表名大小写。
# 控制台地址：http://localhost:8080/h2-console  （JDBC URL 与下面一致）
spring:
  datasource:
    url: jdbc:h2:mem:funfun;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER,KEY,VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # 启动时按 JPA 实体重建表，进程退出即销毁
    show-sql: true
    defer-datasource-initialization: true # 让 data.sql 在 ddl 之后执行（如有）
  sql:
    init:
      mode: always # 若 classpath 下存在 data.sql 则自动跑，方便注入种子数据
  h2:
    console:
      enabled: true
      path: /h2-console


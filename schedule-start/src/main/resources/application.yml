server:
  port: 8080 # 网关端口

spring:
  profiles:
    active: dev

# JWT配置
jwt:
  secret: your-jwt-secret-key-32bytes-long-123456 # 密钥（建议至少32位，生产环境用环境变量）
  expire: 7200 # token过期时间（秒），默认2小时

# 登录白名单（无需登录的路径，如/login接口、公开接口）
gateway:
  auth:
    whitelist:
      - /login
      - /api/public/**
  response:
    cost-time:
      enabled: true # 全局启用耗时统计
      slow-threshold-ms: 500 # 慢请求阈值（超过打印告警日志，可选）
      exclude-paths: # 排除不需要统计的路径（如健康检查，可选）
        - /actuator/health
        - /api/public/*

app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "https://*.funfundaily.com"
      - "https://funfun.com"
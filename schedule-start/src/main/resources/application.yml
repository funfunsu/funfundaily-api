server:
  port: 8080 # 网关端口

spring:
  profiles:
    active: dev
  # 进程内 MCP 服务（Spring AI MCP server，WebMVC/Streamable HTTP 传输，不独立部署）。
  # 单端点 /mcp 承载 JSON-RPC（POST initialize/tools/call，GET 可选 SSE 流），
  # 由 McpAuthFilter 统一做 Bearer Token 鉴权。
  # 注意：protocol=STREAMABLE 与旧版 SSE 互斥（替代 SSE）；客户端须用 type:http 指向 /mcp。
  ai:
    mcp:
      server:
        enabled: true
        stdio: false
        type: SYNC
        protocol: STREAMABLE
        name: funfun-task-mcp-server
        version: 0.1.0
        instructions: "funfun 待办任务 MCP 服务：list/next/checkin。请在请求头携带 Authorization: Bearer <token>，token 绑定 groupId 实现数据隔离。"
        streamable-http:
          mcp-endpoint: /mcp

# JWT配置
jwt:
  secret: your-jwt-secret-key-32bytes-long-123456 # 密钥（建议至少32位，生产环境用环境变量）
  expire: 7200 # token过期时间（秒），默认2小时

# 登录白名单（无需登录的路径，如/login接口、公开接口）
gateway:
  auth:
    whitelist:
      - /login
      - /api/public/**
  response:
    cost-time:
      enabled: true # 全局启用耗时统计
      slow-threshold-ms: 500 # 慢请求阈值（超过打印告警日志，可选）
      exclude-paths: # 排除不需要统计的路径（如健康检查，可选）
        - /actuator/health
        - /api/public/*

app:
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "https://*.funfundaily.com"
      - "https://funfun.com"
  # 发现页条目（app.discovery.items）按环境维护，分别在
  # application-dev.yml / application-prod.yml 中配置。

# 开放接口（OpenAPI / MCP）访问令牌已改为「表配置」：存在 fun_group.open_api_token 列，
# 令牌即绑定该群组，做鉴权与基于 groupId 的数据隔离。增删改令牌只需更新该列，无需改配置或重启。
# dev 的种子令牌见 data.sql；prod 用 SQL 设置（见 script/update_sql.sql）。
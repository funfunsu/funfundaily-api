
# 生产环境：MySQL 数据库（替换为你的生产库配置）
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${DB_NAME}?useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME} # 生产环境用环境变量，避免硬编码
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none # 生产环境禁止自动建表（手动执行 SQL）
    show-sql: false # 关闭 SQL 打印（安全+性能）

# 生产环境：微信小程序正式号配置（替换为你的正式号 appid/secret）
wechat:
  mini:
    appid: ${WECHAT_MINI_APP_ID} # 微信正式号 appid
    secret: ${WECHAT_MINI_SECRET} # 生产环境用环境变量存储 secret
    jscode2session-url: https://api.weixin.qq.com/sns/jscode2session

# 生产环境：JWT 密钥（从环境变量读取，绝对禁止硬编码）
jwt:
  secret: ${JWT_SECRET} # 生产环境通过环境变量注入 32位以上密钥
  expire: 7200 # token过期时间（秒），默认2小时
# 生产环境：日志级别调整（减少日志输出，提升性能）
logging:
  level:
    root: INFO
    com.example: INFO # 业务日志级别
    org.springframework.cloud.gateway: WARN # 网关框架日志级别（减少冗余）

app:
  limit:
    count:
      group: 1
      group-member: 4
    vip-count:
      group: 3
      group-member: 10
  json:
    hanzi-writer-data:
      path: /app/data/hanzi-writer-data
  # 发现页条目：直接增删条目即可，无需改代码
  discovery:
    items:
      - itemTitle: 积分管理
        uri: /subPackages/points/pages/points-product-manage
        itemType: path
        status: active
      - itemTitle: 积分兑换
        uri: /subPackages/points/pages/points-exchange
        itemType: path
        status: active
      - itemTitle: 汉字书写
        uri: /subPackages/study-tools/pages/writing/stroke-order
        itemType: path
        status: active
      - itemTitle: 理财计划
        uri: /subPackages/financial-plan/pages/list/index
        itemType: path
        status: active
      - itemTitle: 邀请函
        uri: /subPackages/invitation/pages/list
        itemType: path
        status: active


